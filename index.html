    <!-- Navbar -->

    <header>
        <nav class="navbar navbar-expand-lg navbar-light bg-dark">

                <a class="navbar-brand" href="#">
                    <img src="../LOGO/vintage-vector-logo-with-classic-football-team-emblem_11065720.png!f305cw.webp"
                        class="img-fluid" alt="Logo" style="max-height:60px;">
                </a>

                <button class="navbar-toggler navbar-dark bg-dark" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarScroll" aria-controls="navbarScroll" aria-expanded="false"
                    aria-label="Toggle navigation">

                    <span class="navbar-toggler-icon"></span>
                </button>


                <div class="collapse navbar-collapse justify-content-end" id="navbarScroll">
                    <ul class="navbar-nav my-2 my-lg-0 navbar-nav-scroll">

                        <li class="nav-item mx-2">

                            <a class="nav-link text-white" href="./HTML/Matches.html">Matches</a>

                        </li>

                    </ul>

            </div>
        </nav>
    </header>

    <div class="container mt-4">

        <div class="row">

            <!-- MAIN SECTION -->

            <main class="col-lg-9 col-md-8 col-12">


                <!-- POLITICS -->

                <h3 class="category-title">Politics</h3>

                <div id="PoliticsNews" class="row g-3">


                </div>

                <!-- ECONOMY -->

                <h3 class="category-title">Economy</h3>

                <div id="EconomyNews" class="row g-3">


                </div>



                <!-- SPORTS -->

                <h3 class="category-title">Sports</h3>

                <div id="SportsNews" class="row g-3">

                <!-- ENTERTAINMENT -->

                <h3 class="category-title">Technology</h3>

                <div id="technologyNews" class="row g-3">

                </div>


            </main>





            <!-- ASIDE -->

            <aside class="col-lg-3 col-md-4 col-12">


                <!-- WEATHER -->

                <div class="widget">

                    <h5><i class="bi bi-cloud-sun"></i> Weather</h5>

                    <h2 id="temperature"> °C</h2>

                    <p id="city">Detecting location...</p>

                </div>



                <!-- CURRENCY CONVERTER -->

                <div class="widget converter">

                    <h5><i class="bi bi-currency-exchange"></i> Currency Converter</h5>

                    <input type="number" id="amount" class="form-control" placeholder="Amount" min="0">

                    <select id="from" class="form-select">
                        <option value="USD">USD</option>

                    </select>

                    <select id="to" class="form-select">
                        <option value="EGP">EGP</option>
                        <option value="USD">USD</option>
                        <option value="SAR">SAR</option>
                    </select>

                    <button class="btn btn-warning w-100" onclick="convertCurrency()">Convert</button>

                    <h5 class="mt-3" id="result"></h5>

                </div>

                <div class="widget" id="live-matches-widget">
                    <h5><i class="bi bi-trophy"></i> Live Matches</h5>

                    <ul class="list-group" id="live-matches-list">
                    </ul>
                </div>
            </aside>
