<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serie A - Player Statistics</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../CSS/home.css">
    <link rel="stylesheet" href="../CSS/statics.css">
</head>

<body class="bg-light">

        <header>
    <nav class="navbar navbar-expand-lg navbar-light bg-dark">
        <div class="container">

            <a class="navbar-brand" href="#">
                <img src="../LOGO/vintage-vector-logo-with-classic-football-team-emblem_11065720.png!f305cw.webp"
                     class="img-fluid" alt="Logo" style="max-height:60px;">
            </a>

            <button class="navbar-toggler navbar-dark bg-dark" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarScroll"
                aria-controls="navbarScroll"
                aria-expanded="false"
                aria-label="Toggle navigation">

                    <span class="navbar-toggler-icon"></span>
            </button>

            
            <div class="collapse navbar-collapse justify-content-end" id="navbarScroll">
                <ul class="navbar-nav my-2 my-lg-0 navbar-nav-scroll">

                    <li class="nav-item mx-2">
                        <a class="nav-link text-white" href="../index.html">Home</a>
                    </li>

                    <li class="nav-item mx-2">
                        <a class="nav-link text-white" href="../HTML/Matches.html">Matches</a>
                    </li>

                    <li class="nav-item mx-2">
                        <a class="nav-link text-white" href="../HTML/statics.html">Statistics</a>
                    </li>

                    <li class="nav-item mx-2">
                        <a class="nav-link text-white" href="../HTML/table.html">Table</a>
                    </li>

                </ul>
            </div>

        </div>
    </nav>
</header>


    <main class="container my-5">
        <div class="row mb-4">
            <div class="col">
                <h2 class="fw-bold border-start border-warning border-4 ps-3 text-uppercase">📊 Player Performance
                    Statistics</h2>
                <p class="text-muted small">Comprehensive breakdown of goals and discipline</p>
            </div>
        </div>

        <div class="row">
            <div class="col-12">
                <div class="stats-card bg-white rounded-3 shadow-sm overflow-hidden">
                    <div class="bg-dark text-white p-3 d-flex justify-content-between align-items-center">
                        <span class="fw-bold">SERIE A - PLAYER RANKINGS</span>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light text-secondary small fw-bold">
                                <tr>
                                    <th class="ps-4" style="width: 5%;">#</th>
                                    <th style="width: 25%;">Player</th>
                                    <th style="width: 20%;">Team</th>
                                    <th class="text-center" style="width: 10%;">Goals</th>
                                    <th class="text-center" style="width: 10%;">Assists</th>
                                    <th class="text-center" style="width: 15%;">Yellow Cards</th>
                                    <th class="text-center" style="width: 15%;">Red Cards</th>
                                </tr>
                            </thead>
                            <tbody id="all-player-stats">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../JS/statics.js"></script>
</body>

</html>
